name: Build Makefile (Ubuntu & ARM)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x86_64
            apt_packages: build-essential
            make_args: ""

          #- architecture: arm64
            #apt_packages: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
           # make_args: "CC=aarch64-linux-gnu-gcc CXX=aarch64-linux-gnu-g++"

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Instalar toolchains de compilação
      run: |
        sudo apt-get update
        sudo apt-get install -y ${{ matrix.apt_packages }}

    - name: Compilar com Makefile
      # Variável de ambiente configurada aqui para o Makefile ignorar os arquivos do Windows/Mac
      env:
        HOST_OS: linux
      run: make ${{ matrix.make_args }}
      working-directory: ${{ github.workspace }}
      
    # --- NOVO PASSO AQUI ---
    - name: Salvar binário (Upload Artifact)
      uses: actions/upload-artifact@v4
      with:
        # Usa a variável da matriz para dar um nome diferente para o arquivo do PC e do ARM
        name: executavel-sdb-${{ matrix.architecture }}
        
        # COLOQUE AQUI O NOME DO BINÁRIO QUE O MAKEFILE GERA (ex: sdb, out/sdb, etc)
        path: ./bin/sdb
